<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code - Aphaday</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin: 0 0 10px 0;
      font-size: 28px;
    }
    p {
      color: #666;
      margin: 0 0 30px 0;
      font-size: 16px;
    }
    #qrcode {
      display: inline-block;
      padding: 20px;
      background: white;
      border-radius: 15px;
    }
    #qrcode svg {
      max-width: 320px;
      height: auto;
    }
    .url {
      margin-top: 30px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 10px;
      font-mono: monospace;
      word-break: break-all;
      color: #333;
      font-size: 14px;
    }
    .instructions {
      margin-top: 30px;
      padding: 20px;
      background: #e8f4f8;
      border-left: 4px solid #667eea;
      border-radius: 8px;
      text-align: left;
      font-size: 14px;
      color: #333;
    }
    .instructions h3 {
      margin: 0 0 10px 0;
      color: #667eea;
    }
    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }
    .instructions li {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Aphaday</h1>
    <p>Escaneie com seu celular</p>
    
    <div id="qrcode"></div>
    
    <div class="url" id="url-display"></div>
    
    <div class="instructions">
      <h3>📖 Como usar:</h3>
      <ol>
        <li>Abra a câmera do seu celular</li>
        <li>Aponte para este QR code</li>
        <li>Toque no link que aparecer</li>
        <li>Aceite acessar o seu dispositivo local</li>
      </ol>
    </div>
  </div>

  <script>
    // Detectar IP local
    function getLocalIP() {
      const protocol = window.location.protocol;
      const hostname = window.location.hostname;
      const port = window.location.port || (protocol === 'https:' ? 443 : 80);
      
      // Se for localhost, tenta pegar o IP da máquina
      if (hostname === 'localhost' || hostname === '127.0.0.1') {
        // Tenta usar ipv4.icanhazip.com ou similar
        fetch('https://api.ipify.org?format=json')
          .then(r => r.json())
          .then(data => {
            const url = `${protocol}//${data.ip}:8080`;
            generateQR(url);
          })
          .catch(() => {
            // Se não conseguir, usa localhost
            const url = `${protocol}//${hostname}:8080`;
            generateQR(url);
          });
      } else {
        const url = `${protocol}//${hostname}:${port}`;
        generateQR(url);
      }
    }

    function generateQR(url) {
      // Limpar QR code anterior
      document.getElementById('qrcode').innerHTML = '';
      
      // Gerar novo QR code
      new QRCode(document.getElementById('qrcode'), {
        text: url,
        width: 300,
        height: 300,
        colorDark: '#667eea',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      
      // Mostrar URL
      document.getElementById('url-display').innerHTML = `
        <strong>URL:</strong><br/>
        <a href="${url}" target="_blank">${url}</a>
      `;
    }

    // Gerar QR code quando a página carregar
    window.addEventListener('load', getLocalIP);
  </script>
</body>
</html>
